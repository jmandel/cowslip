name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Test
        run: bun test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          BUN_PUBLIC_INSTANT_APP_ID: ${{ vars.BUN_PUBLIC_INSTANT_APP_ID }}

      - name: Check static bundle for admin-token references
        run: |
          if grep -R --fixed-strings "INSTANT_APP_ADMIN_TOKEN" dist; then
            echo "Instant admin token reference leaked into dist" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
